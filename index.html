<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Firefly Prompt Library</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0b0b0b;
    color: white;
  }

  /* Top guide */
  .topbar{
    position:sticky;
    top:0;
    z-index:50;
    background:linear-gradient(180deg, rgba(10,10,10,0.92), rgba(10,10,10,0.72));
    backdrop-filter: blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .topbar__inner{
    display:flex;
    gap:16px;
    align-items:center;
    justify-content:space-between;
    padding:18px 40px;
  }
  .brand__title{
    font-size:16px;
    font-weight:900;
  }
  .brand__subtitle{
    margin-top:4px;
    font-size:12px;
    opacity:0.72;
  }

  .guide{
    padding:0 40px 18px 40px;
  }
  .guide__callout{
    padding:14px 16px;
    border-radius:14px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.10);
    font-size:14px;
    line-height:1.4;
  }
  .guide__callout strong{ font-weight:900; }

  /* Search */
  .searchWrap{
    padding:20px 40px 0 40px;
  }
  .search{
    width:100%;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.1);
    background:#111;
    color:white;
    font-size:14px;
  }

  /* Cards */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    padding: 28px 40px 40px 40px;
  }

  .card {
    background: linear-gradient(145deg, #111, #1a1a1a);
    border-radius: 20px;
    padding: 20px;
    cursor: pointer;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .card:hover {
    transform: translateY(-6px) scale(1.02);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .title {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 10px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .tag {
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    opacity: 0.85;
  }

  .prompt {
    font-size: 12px;
    line-height: 1.4;
    opacity: 0;
    max-height: 0;
    transition: all 0.3s ease;
  }

  .card:hover .prompt {
    opacity: 1;
    max-height: 220px;
    margin-top: 10px;
  }

  .btn {
    margin-top: 14px;
    padding: 10px;
    border-radius: 10px;
    background: white;
    color: black;
    text-align: center;
    font-size: 13px;
    font-weight: 800;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    padding: 10px 16px;
    border-radius: 999px;
    opacity: 0;
    transition: 0.3s;
  }

  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar__inner">
    <div>
      <div class="brand__title">Firefly Prompt Library</div>
      <div class="brand__subtitle">Copy → Replace Reference → Generate</div>
    </div>
  </div>
  <div class="guide">
    <div class="guide__callout">
      ⚠️ Firefly 진입 후 좌측 <strong>컴포지션 → 참조 이미지</strong>를 <strong>1500×1500px 정사각형 한글 PNG</strong>로 반드시 교체하세요.
    </div>
  </div>
</header>

<div class="searchWrap">
  <input type="text" id="search" class="search" placeholder="Search material..." />
</div>

<div class="grid" id="grid"></div>
<div class="toast" id="toast">Copied</div>

<script>
const data = window.data || [];

const grid = document.getElementById("grid");
const toast = document.getElementById("toast");
const searchInput = document.getElementById("search");

function showToast(){
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),1000);
}

function renderCards(list){
  grid.innerHTML = "";
  list.forEach(item=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="title">${item.title}</div>
      <div class="tags">${item.tags.map(t=>`<div class="tag">${t}</div>`).join("")}</div>
      <div class="prompt">${item.prompt}</div>
      <div class="btn">Generate</div>
    `;

    card.onclick = ()=>{
      navigator.clipboard.writeText(item.prompt);
      showToast();
      setTimeout(()=>window.open(item.link, "_blank"),400);
    };

    grid.appendChild(card);
  });
}

function filterCards(){
  const keyword = searchInput.value.toLowerCase();
  const filtered = data.filter(item=>
    item.title.toLowerCase().includes(keyword) ||
    item.prompt.toLowerCase().includes(keyword) ||
    item.tags.join(" ").toLowerCase().includes(keyword)
  );
  renderCards(filtered);
}

searchInput.addEventListener("input", filterCards);

renderCards(data);
</script>

</body>
</html>
