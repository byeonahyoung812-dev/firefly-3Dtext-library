<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Firefly Prompt Library</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0b0b0b;
    color: white;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    padding: 40px;
  }

  .card {
    background: linear-gradient(145deg, #111, #1a1a1a);
    border-radius: 20px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .card:hover {
    transform: translateY(-6px) scale(1.02);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .tag {
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    opacity: 0.8;
  }

  .prompt {
    font-size: 12px;
    line-height: 1.4;
    opacity: 0;
    max-height: 0;
    transition: all 0.3s ease;
  }

  .card:hover .prompt {
    opacity: 1;
    max-height: 200px;
    margin-top: 10px;
  }

  .btn {
    margin-top: 14px;
    padding: 10px;
    border-radius: 10px;
    background: white;
    color: black;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
  }

  .chrome { background: linear-gradient(90deg,#aaa,#fff,#888); -webkit-background-clip:text; color:transparent; }
  .glass { backdrop-filter: blur(10px); }
  .neon { text-shadow: 0 0 10px #f0f; }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    padding: 10px 16px;
    border-radius: 999px;
    opacity: 0;
    transition: 0.3s;
  }

  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div style="padding:20px 40px 0 40px; font-size:13px; opacity:0.6;">
⚠️ Firefly 사용 전: 참조 이미지는 1500×1500px로 제작 후 교체 권장
</div>

<div class="grid" id="grid"></div>
<div class="toast" id="toast">Copied</div>

<script>
const data = [
  {
    title: "CHROME",
    class: "chrome",
    tags: ["metal","reflective"],
    prompt: "reflective, shiny chrome material, polished, 3d",
    link: "https://firefly.adobe.com/open/urn:aaid:sc:AP:88e7d425-9241-45b7-a3fb-76e96f0f0700"
  },
  {
    title: "GLASS",
    class: "glass",
    tags: ["transparent","clean"],
    prompt: "liquid glass material, white",
    link: "https://firefly.adobe.com/open/urn:aaid:sc:AP:1e5cc06c-dda7-4211-b449-286551cdb54a"
  },
  {
    title: "CLOUD",
    tags: ["soft","volumetric"],
    prompt: "fluffy cloud texture, soft edges",
    link: "https://firefly.adobe.com/open/urn:aaid:sc:AP:ad1e9839-3cdd-40af-8462-bbc15a35cc84"
  }
];

const grid = document.getElementById("grid");

function showToast(){
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1000);
}

data.forEach(item=>{
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="title ${item.class||""}">${item.title}</div>
    <div class="tags">
      ${item.tags.map(t=>`<div class="tag">${t}</div>`).join("")}
    </div>
    <div class="prompt">${item.prompt}</div>
    <div class="btn">Generate</div>
  `;

  card.onclick = ()=>{
    navigator.clipboard.writeText(item.prompt);
    showToast();
    setTimeout(()=>{
      window.open(item.link, "_blank");
    }, 400);
  }

  grid.appendChild(card);
});
</script>

</body>
</html>
